name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 8 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Build static demo (matches publish workflow)
        env:
          VITE_STATIC_MODE: "true"
          VITE_TENANT_ID: agent-readiness-project
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Verify SPA 404 fallback exists and redirects to hash route
        run: |
          set -euo pipefail
          test -f dist/404.html
          grep -q 'location.replace' dist/404.html
          grep -q "${{ github.event.repository.name }}" dist/404.html
          grep -q '#' dist/404.html
      - name: Verify static data shipped with build
        run: |
          set -euo pipefail
          test -f dist/data/healthz.json
          test -f dist/data/tenants/agent-readiness-project/overview.json
          python3 -c 'import json; json.load(open("dist/data/healthz.json"))'
          python3 -c 'import json; json.load(open("dist/data/tenants/agent-readiness-project/overview.json"))'

  self-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install agent-readiness CLI
        run: |
          python -m pip install --upgrade pip
          pip install "agent-readiness>=1.1.0"
      - name: Self-scan (must score >= 95)
        run: agent-readiness scan . --fail-below 95
