name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 8 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin to v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin to v6.4.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Protocol constants drift check
        # Regenerate src/types/protocol.generated.ts from the pinned
        # protocol commit and fail if the result differs from what's
        # committed. Keeps Pillar/Severity in lockstep with the protocol.
        run: |
          node scripts/regen_protocol_constants.mjs
          git diff --exit-code -- src/types/protocol.generated.ts
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # Belt-and-braces: contributors are expected to install local
      # pre-commit hooks via `pre-commit install`; this step makes CI
      # fail loudly the same way if they didn't.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pin to v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run all pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Build static demo (matches publish workflow)
        env:
          VITE_STATIC_MODE: "true"
          VITE_TENANT_ID: agent-readiness-project
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Verify SPA 404 fallback exists and redirects to hash route
        run: |
          set -euo pipefail
          test -f dist/404.html
          grep -q 'location.replace' dist/404.html
          grep -q "${{ github.event.repository.name }}" dist/404.html
          grep -q '#' dist/404.html
      - name: Verify static data shipped with build
        run: |
          set -euo pipefail
          test -f dist/data/healthz.json
          test -f dist/data/tenants/agent-readiness-project/overview.json
          python3 -c 'import json; json.load(open("dist/data/healthz.json"))'
          python3 -c 'import json; json.load(open("dist/data/tenants/agent-readiness-project/overview.json"))'

  self-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin to v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pin to v5
        with:
          python-version: "3.12"
      - name: Install agent-readiness CLI
        run: |
          python -m pip install --upgrade pip
          pip install "agent-readiness>=1.1.0"
      - name: Self-scan (must score >= 95)
        run: agent-readiness scan . --fail-below 95
