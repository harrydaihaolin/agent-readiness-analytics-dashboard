name: publish

# Build the static demo from committed public/data/ and deploy to GitHub Pages.
# The analytics engine stays in a private repo — refresh data locally (or in
# private CI) with export-static, commit, then push this repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dashboard deps
        run: npm ci

      - name: Build static dashboard
        env:
          VITE_STATIC_MODE: "true"
          VITE_TENANT_ID: agent-readiness-project
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Probe live site
        env:
          BASE: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ]; then
            echo "::error::deploy job did not expose page_url"; exit 1
          fi
          echo "Probing $BASE"

          # 1) Root serves the SPA shell (index.html with #root mount point).
          curl --fail --silent --show-error --location --retry 6 --retry-delay 5 \
            --retry-all-errors "$BASE" -o /tmp/index.html
          grep -q '<div id="root"></div>' /tmp/index.html

          # 2) Built JS asset under the configured base path is reachable.
          asset=$(grep -oE '/[^"]*assets/[^"]*\.js' /tmp/index.html | head -n1)
          test -n "$asset"
          curl --fail --silent --show-error -o /dev/null \
            "${BASE%/}${asset}"

          # 3) Static data lives under /data and is valid JSON.
          curl --fail --silent --show-error "${BASE}data/healthz.json" \
            | python3 -c 'import json,sys; json.load(sys.stdin)'

          # 4) Deep SPA route returns the 404 fallback redirect (not a generic
          #    GitHub 404). Pages serves the redirect with HTTP 404, which is
          #    expected — we just need the body to be the SPA fallback.
          code=$(curl --silent --output /tmp/deep.html --write-out '%{http_code}' \
            "${BASE}repos/agent-readiness%2Fagent-readiness-analytics-dashboard")
          if [ "$code" != "200" ] && [ "$code" != "404" ]; then
            echo "::error::Unexpected status $code on deep route"; exit 1
          fi
          grep -q "location.replace" /tmp/deep.html
          grep -q "agent-readiness-analytics-dashboard" /tmp/deep.html
